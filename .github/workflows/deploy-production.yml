name: Deploy production
run-name: Deploy ${{ inputs.image_tag }} to production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (for example, v1.0.1)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
      PROD_SSH_PORT: ${{ vars.PROD_SSH_PORT }}
      PROD_SSH_USER: ${{ vars.PROD_SSH_USER }}
      PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}
      PROD_SSH_KNOWN_HOSTS: ${{ vars.PROD_SSH_KNOWN_HOSTS }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -Eeuo pipefail

          [[ "${IMAGE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] \
            || { echo "invalid image tag: ${IMAGE_TAG}"; exit 1; }
          [[ "${PROD_SSH_PORT}" =~ ^[0-9]+$ ]] \
            && ((PROD_SSH_PORT >= 1 && PROD_SSH_PORT <= 65535)) \
            || { echo "invalid PROD_SSH_PORT"; exit 1; }
          [[ "${PROD_SSH_USER}" =~ ^[a-z_][a-z0-9_-]*$ ]] \
            || { echo "invalid PROD_SSH_USER"; exit 1; }
          [[ -n "${PROD_SSH_HOST}" && "${PROD_SSH_HOST}" != *$'\n'* ]] \
            || { echo "invalid PROD_SSH_HOST"; exit 1; }
          [[ "${PROD_DEPLOY_PATH}" == /* && "${PROD_DEPLOY_PATH}" != *$'\n'* ]] \
            || { echo "invalid PROD_DEPLOY_PATH"; exit 1; }
          test -n "${PROD_SSH_KNOWN_HOSTS}" \
            || { echo "PROD_SSH_KNOWN_HOSTS production variable is missing"; exit 1; }
          test -n "${PROD_SSH_PRIVATE_KEY}" \
            || { echo "PROD_SSH_PRIVATE_KEY production secret is missing"; exit 1; }

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          SSH_DIR="${RUNNER_TEMP}/prizeforge-ssh"
          install -d -m 700 "${SSH_DIR}"
          printf '%s\n' "${PROD_SSH_PRIVATE_KEY}" >"${SSH_DIR}/id_ed25519"
          printf '%s\n' "${PROD_SSH_KNOWN_HOSTS}" >"${SSH_DIR}/known_hosts"
          chmod 600 "${SSH_DIR}/id_ed25519" "${SSH_DIR}/known_hosts"

      - name: Deploy to production
        shell: bash
        run: |
          set -Eeuo pipefail
          SSH_DIR="${RUNNER_TEMP}/prizeforge-ssh"
          printf -v remote_command 'bash -s -- %q %q' "${IMAGE_TAG}" "${PROD_DEPLOY_PATH}"
          ssh \
            -F /dev/null \
            -i "${SSH_DIR}/id_ed25519" \
            -p "${PROD_SSH_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=${SSH_DIR}/known_hosts" \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "${remote_command}" \
            <deploy/deploy.sh

      - name: Write deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo "## Production deployment"
            echo
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Host: \`${PROD_SSH_HOST}\`"
            echo "- Deploy path: \`${PROD_DEPLOY_PATH}\`"
            echo "- Result: success"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Remove SSH credentials
        if: always()
        shell: bash
        run: |
          rm -f \
            "${RUNNER_TEMP}/prizeforge-ssh/id_ed25519" \
            "${RUNNER_TEMP}/prizeforge-ssh/known_hosts"
          rmdir "${RUNNER_TEMP}/prizeforge-ssh" 2>/dev/null || true
