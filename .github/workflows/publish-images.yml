name: Publish images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.ACR_REGISTRY }}
  NAMESPACE: ${{ vars.ACR_NAMESPACE }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run formatting, vet, and tests
        run: make check

  publish:
    name: Publish ${{ matrix.image }}
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: prizeforge-api
            target: api
          - image: prizeforge-admin
            target: admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate registry configuration
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          test -n "${REGISTRY}" || { echo "ACR_REGISTRY repository variable is missing"; exit 1; }
          test -n "${NAMESPACE}" || { echo "ACR_NAMESPACE repository variable is missing"; exit 1; }
          test -n "${ACR_USERNAME}" || { echo "ACR_USERNAME repository secret is missing"; exit 1; }
          test -n "${ACR_PASSWORD}" || { echo "ACR_PASSWORD repository secret is missing"; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
