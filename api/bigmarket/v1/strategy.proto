syntax = "proto3";

package api.bigmarket.v1;

import "google/api/annotations.proto";

option go_package = "big-market-kratos/api/bigmarket/v1;v1";
option java_multiple_files = true;
option java_package = "api.bigmarket.v1";

service Strategy {
  // 装配抽奖策略
  // 对应: GET /api/v1/raffle/strategy/armory?strategy_id=xxx
  rpc StrategyArmory(StrategyArmoryRequest) returns (StrategyArmoryReply) {
    option (google.api.http) = {get: "/api/v1/strategy/raffle/strategy/armory"};
  }

  // 查询奖品列表
  // 对应: GET /api/v1/raffle/query_raffle_award_list?strategy_id=xxx
  rpc QueryRaffleAwardList(QueryRaffleAwardListRequest) returns (QueryRaffleAwardListReply) {
    option (google.api.http) = {get: "/api/v1/strategy/raffle/strategy/query_raffle_award_list"};
  }

  // 随机抽奖接口 (核心计算)
  // 对应: GET /api/v1/raffle/random_raffle?strategy_id=xxx
  // 注意：虽然原接口是 GET，但为了传参规范，建议内部用 POST 或显式参数
  rpc RandomRaffle(RandomRaffleRequest) returns (RandomRaffleReply) {
    option (google.api.http) = {
      post: "/api/v1/strategy/raffle/strategy/random_raffle"
      body: "*"
    };
  }

  // 查询策略规则权重
  // 对应: POST /api/v1/raffle/strategy/query_raffle_strategy_rule_weight
  rpc QueryRaffleStrategyRuleWeight(QueryRaffleStrategyRuleWeightRequest) returns (QueryRaffleStrategyRuleWeightReply) {
    option (google.api.http) = {
      post: "/api/v1/strategy/raffle/strategy/query_raffle_strategy_rule_weight"
      body: "*"
    };
  }
}

// --- Request/Reply Definitions ---

message StrategyArmoryRequest {
  int64 strategy_id = 1; // 修正: 装配的是策略，不是活动
}

message StrategyArmoryReply {
  bool success = 1;
}

message QueryRaffleAwardListRequest {
  int64 strategy_id = 1; // 修正: 查的是策略下的奖品
  string user_id = 2; // 可选: 用于后续扩展（如根据用户过滤）
}

message RaffleAward {
  int64 award_id = 1;
  string award_title = 2;
  string award_subtitle = 3;
  int32 sort = 4;
}

message QueryRaffleAwardListReply {
  repeated RaffleAward awards = 1;
}

message RandomRaffleRequest {
  int64 strategy_id = 1;
  string user_id = 2; // 补充: 抽奖必须知道是谁
}

message RandomRaffleReply {
  int64 award_id = 1;
  string award_title = 2;
  int32 award_index = 3; // 补充: 奖品顺序
}

message QueryRaffleStrategyRuleWeightRequest {
  string user_id = 1;
  int64 activity_id = 2;
}

message StrategyAward {
  int64 award_id = 1;
  string award_title = 2;
}

message RuleWeightResponse {
  int64 rule_weight_count = 1;
  int64 user_activity_account_total_use_count = 2;
  repeated StrategyAward strategy_awards = 3;
}

message QueryRaffleStrategyRuleWeightReply {
  repeated RuleWeightResponse rule_weight_list = 1;
}
